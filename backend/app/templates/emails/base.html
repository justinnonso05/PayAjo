<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}{% endblock %}</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f7faf8; margin: 0; padding: 0; color: #1a1a2e;">
    <div style="max-width: 500px; margin: 40px auto; background-color: #ffffff; padding: 32px;">
        <div style="text-align: center; margin-bottom: 32px;">
            <h1 style="color: #2F855A; margin: 0; font-size: 24px; font-weight: 600;">PayAjo</h1>
        </div>
        
        <div style="font-size: 15px; line-height: 1.6;">
            {% block content %}{% endblock %}
        </div>
        
        <div style="margin-top: 48px; text-align: center; font-size: 12px; color: #888888;">
            <p>PayAjo — Rotating savings, reimagined.</p>
        </div>
    </div>
</body>
</html>
